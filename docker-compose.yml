services:
  redis:
    image: redis:7
    container_name: jobboard_redis
    ports:
      - "6380:6379"
    restart: unless-stopped
    volumes:
      - redis_data:/data

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.19.10
    container_name: jobboard_elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.security.http.ssl.enabled=false
      - xpack.security.transport.ssl.enabled=false
      - ES_JAVA_OPTS=-Xms1g -Xmx1g
      - bootstrap.memory_lock=true
    ports:
      - "9200:9200"
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - es_data:/usr/share/elasticsearch/data
    restart: unless-stopped

  laravel_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: jobboard_worker
    restart: unless-stopped
    command: php artisan horizon # ◄ Changed from queue:work
    volumes:
      - ./backend:/var/www/html
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - redis
    env_file:
      - ./backend/.env
    environment:
      - REDIS_HOST=jobboard_redis
      - REDIS_PORT=6379
      - DB_HOST=host.docker.internal

volumes:
  redis_data:
  es_data: